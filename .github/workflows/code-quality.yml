name: WordPress Child Theme Code Quality

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

permissions:
  contents: read

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.0'

    # Run PHPStan (Static Analysis)
    - name: Run PHPStan
      run: phpstan analyse --level=2 ./wp-content/themes/your-child-theme

    # Run PHPCS (Code Standards)
    - name: Run PHPCS
      run: phpcs --standard=WordPress ./wp-content/themes/your-child-theme
